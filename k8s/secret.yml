# ============================================================
# IMPORTANT: For production, use a proper secret management
# solution (e.g., Sealed Secrets, External Secrets, Vault).
#
# Values below are base64-encoded. To encode your own:
#   echo -n 'your-value' | base64
#
# Encoded values:
#   postgres   -> cG9zdGdyZXM=
#   p@ssw0rd   -> cEBzc3cwcmQ=
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: wallet-db-secret
  namespace: digital-wallet
  labels:
    app.kubernetes.io/name: wallet-db
    app.kubernetes.io/component: secret
type: Opaque
data:
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: cEBzc3cwcmQ=
  SPRING_DATASOURCE_USERNAME: cG9zdGdyZXM=
  SPRING_DATASOURCE_PASSWORD: cEBzc3cwcmQ=
