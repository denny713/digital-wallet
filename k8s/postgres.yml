apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-db
  namespace: digital-wallet
  labels:
    app.kubernetes.io/name: wallet-db
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wallet-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wallet-db
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: digital_wallet
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: wallet-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallet-db-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - digital_wallet
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - digital_wallet
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: wallet-db-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: wallet-db-svc
  namespace: digital-wallet
  labels:
    app.kubernetes.io/name: wallet-db
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: wallet-db
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wallet-db-pvc
  namespace: digital-wallet
  labels:
    app.kubernetes.io/name: wallet-db
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
